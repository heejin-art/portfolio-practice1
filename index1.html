<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Heejin Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    /* 배경 */
    .hero {
      width: 100%;
      height: 100vh;
      background: url('./images/hero_3.png') no-repeat center;
      background-size: cover;
      position: relative;
      overflow: hidden;
    }

    /* 열쇠 */
    .key {
      position: absolute;
      width: 220px;
      left: 0;
      top: 0;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.35));
    }

    /* 열쇠구멍 (보이지 않지만 기준점) */
    .keyhole {
      position: absolute;
      left: 50%;
      top: 78%;
      width: 120px;
      height: 160px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* 반짝 효과 */
    .sparkle {
      position: absolute;
      left: 50%;
      top: 78%;
      width: 220px;
      height: 220px;
      transform: translate(-50%, -50%) scale(0);
      border-radius: 50%;
      opacity: 0;
      background: radial-gradient(circle, #fff, #8fd3ff, transparent 70%);
      pointer-events: none;
    }

    .sparkle.active {
      animation: sparkle 1s ease-out forwards;
    }

    /* 키 들어가는 애니메이션 */
    .key.unlock {
      animation: unlock 1.1s ease forwards;
      filter:
        drop-shadow(0 0 20px #fff)
        drop-shadow(0 0 50px #8fd3ff);
    }

    /* 화면 전환 */
    .fade {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      z-index: 99;
      pointer-events: none;
    }

    .fade.active {
      animation: fade 0.8s forwards;
    }

    @keyframes unlock {
      0% {
        transform: translate(-50%, -50%) rotate(0deg) scale(1);
        opacity: 1;
      }
      50% {
        transform: translate(-50%, -50%) rotate(40deg) scale(0.6);
      }
      100% {
        transform: translate(-50%, -50%) rotate(90deg) scale(0.1);
        opacity: 0;
      }
    }

    @keyframes sparkle {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.5);
      }
    }

    @keyframes fade {
      to {
        opacity: 1;
      }
    }

  </style>
</head>

<body>

  <div class="hero">
    <img src="./images/key.png" class="key" id="key">
    <div class="keyhole" id="keyhole"></div>
    <div class="sparkle" id="sparkle"></div>
  </div>

  <div class="fade" id="fade"></div>

  <script>
    const key = document.getElementById("key");
    const keyhole = document.getElementById("keyhole");
    const sparkle = document.getElementById("sparkle");
    const fade = document.getElementById("fade");

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;

    let currentX = mouseX;
    let currentY = mouseY;

    let unlocked = false;

    window.addEventListener("mousemove", (e) => {
      if (unlocked) return;
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function animate() {
      if (unlocked) return;

      const rect = keyhole.getBoundingClientRect();
      const holeX = rect.left + rect.width / 2;
      const holeY = rect.top + rect.height / 2;

      const distance = Math.hypot(mouseX - holeX, mouseY - holeY);

      // 🔥 열쇠가 정확히 가까워지면
      if (distance < 100) {
        unlocked = true;

        // 위치 고정
        key.style.left = holeX + "px";
        key.style.top = holeY + "px";

        key.classList.add("unlock");
        sparkle.classList.add("active");

        setTimeout(() => {
          fade.classList.add("active");
        }, 700);

        setTimeout(() => {
          location.href = "main.html"; // 👉 여기만 바꿔
        }, 1400);

        return;
      }

      // 평소 따라오기
      currentX += (mouseX - currentX) * 0.1;
      currentY += (mouseY - currentY) * 0.1;

      const rotate = (mouseX - currentX) * 0.04;

      key.style.left = currentX + "px";
      key.style.top = currentY + "px";
      key.style.transform = `translate(-50%, -50%) rotate(${rotate}deg)`;

      requestAnimationFrame(animate);
    }

    animate();
  </script>

</body>
</html>
