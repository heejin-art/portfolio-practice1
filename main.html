<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Heejin Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#dbeaff, #f4edff);
      color: #4a4a6a;
    }

    section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 64px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      opacity: 0.7;
    }

    .menu {
      display: flex;
      gap: 40px;
      margin-top: 40px;
    }

    .menu a {
      text-decoration: none;
      font-size: 22px;
      padding: 14px 28px;
      border-radius: 30px;
      background: white;
      color: #5b6bdc;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .menu a:hover {
      transform: translateY(-5px);
    }
  </style>
</head>

<body>

  <section>
    <h1>Heejin's Portfolio</h1>
    <p>문제를 구조적으로 해결하는 UX/UI 디자이너</p>

    <div class="menu">
      <a href="#">About</a>
      <a href="#">Project</a>
      <a href="#">Contact</a>
    </div>
  </section>

</body>
</html>
