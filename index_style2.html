<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEEJIN PORTFOLIO</title>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      overflow: hidden;
    }

    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      padding-left: 120px;
      overflow: hidden;
    }

    .hero h1 {
      font-size: clamp(52px, 7vw, 100px);
      font-weight: 600;
      color: rgba(15,23,42,0.8);
      line-height: 0.95;
      z-index: 2;
    }

    .hero p {
      margin-top: 24px;
      font-size: 18px;
      color: rgba(15,23,42,0.6);
      z-index: 2;
    }

    /* 🔥 마우스 따라오는 도형 */
    .cursor-shape {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 40px;
      background: linear-gradient(135deg, #a5b4fc, #6366f1);
      filter: blur(20px);
      opacity: 0.5;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 0.08s linear;
      z-index: 1;
    }

    /* 약간 입체 느낌 */
    .cursor-shape::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 40px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), transparent);
    }

  </style>
</head>

<body>

  <div class="hero">
    <div class="cursor-shape" id="shape"></div>

    <div>
      <h1>HEEJIN'S<br>PORTFOLIO</h1>
      <p>문제를 구조화하고, 사용자 흐름을 설계하는 UX/UI 디자이너 희진입니다.</p>
    </div>
  </div>

  <script>
    const shape = document.getElementById("shape");

    let mouseX = 0;
    let mouseY = 0;

    let currentX = 0;
    let currentY = 0;

    document.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function animate() {
      currentX += (mouseX - currentX) * 0.1;
      currentY += (mouseY - currentY) * 0.1;

      shape.style.transform = `translate(${currentX}px, ${currentY}px)`;

      requestAnimationFrame(animate);
    }

    animate();
  </script>

</body>
</html>
