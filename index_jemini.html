<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heejin's Portfolio - Interactive</title>
    <style>
        /* CSS 영역 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 스크롤바 숨김 */
            cursor: none;    /* 기본 마우스 커서 숨김 (열쇠가 커서 역할) */
        }

        /* 배경 이미지 설정 */
        .hero-section {
            width: 100%;
            height: 100vh;
            background-image: url('hero_3.png'); /* 배경 이미지 파일명 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 마우스를 따라다닐 열쇠 설정 */
        .mouse-follower {
            position: fixed;
            top: 0;
            left: 0;
            width: 120px;       /* 열쇠 크기 조절 */
            height: auto;
            pointer-events: none; /* 열쇠 때문에 클릭이 안 되는 현상 방지 */
            z-index: 9999;
            will-change: transform;
        }
    </style>
</head>
<body>

    <section class="hero-section"></section>

    <img src="key.png" alt="Key" class="mouse-follower" id="key">

    <script>
        // JavaScript 영역
        const key = document.getElementById('key');

        let mouseX = 0;  // 실제 마우스 위치 X
        let mouseY = 0;  // 실제 마우스 위치 Y
        let keyX = 0;    // 열쇠가 현재 있는 위치 X
        let keyY = 0;    // 열쇠가 현재 있는 위치 Y

        // 1. 마우스가 움직일 때 좌표 업데이트
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // 2. 부드러운 움직임을 위한 애니메이션 루프
        function animate() {
            // Lerp 기법: (목표값 - 현재값) * 속도
            // 0.1을 조절하면 따라오는 속도가 달라집니다 (낮을수록 더 쫀득하게 따라옴)
            keyX += (mouseX - keyX) * 0.1;
            keyY += (mouseY - keyY) * 0.1;

            // 열쇠 이미지의 중심이 마우스 끝에 오도록 계산하여 이동
            // (key.clientWidth / 2)를 빼주어 정중앙 정렬
            const targetX = keyX - (key.clientWidth / 2);
            const targetY = keyY - (key.clientHeight / 2);

            key.style.transform = `translate(${targetX}px, ${targetY}px)`;

            requestAnimationFrame(animate);
        }

        // 애니메이션 시작
        animate();
    </script>
</body>
</html>
