<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Heejin Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      cursor: none;
      background: #b9d8ff;
    }

    .hero {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: url("./images/hero_3_bg.png") no-repeat center;
      background-size: cover;
    }

    /* 글씨 이미지 */
    .hero-title {
      position: absolute;
      left: 50%;
      top: 40%;
      width: 58vw;
      max-width: 1100px;
      min-width: 700px;
      transform: translate(-50%, -50%);
      z-index: 3;
      pointer-events: none;
      animation: floatTitle 3.2s ease-in-out infinite;
      filter: drop-shadow(0 16px 24px rgba(80, 80, 140, 0.28));
    }

    @keyframes floatTitle {
      0% {
        transform: translate(-50%, -50%) translateY(0);
      }
      50% {
        transform: translate(-50%, -50%) translateY(-14px);
      }
      100% {
        transform: translate(-50%, -50%) translateY(0);
      }
    }

    /* 열쇠 */
    .key {
      position: absolute;
      width: 220px;
      left: 12%;
      top: 18%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 20;
      filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.35));
      transition: filter 0.2s ease;
    }

    /* 열쇠구멍 기준점 */
    .keyhole {
      position: absolute;
      left: 50%;
      top: 72%;
      width: 70px;
      height: 95px;
      transform: translate(-50%, -50%);
      z-index: 5;
      pointer-events: none;
    }

    /* 가까워졌을 때 빛 */
    .magnet-glow {
      position: absolute;
      left: 50%;
      top: 72%;
      width: 130px;
      height: 130px;
      transform: translate(-50%, -50%) scale(0.7);
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255,255,255,0.9),
        rgba(144,202,255,0.4),
        transparent 70%
      );
      opacity: 0;
      z-index: 4;
      pointer-events: none;
      transition: 0.25s ease;
    }

    .magnet-glow.active {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* 반짝 효과 */
    .sparkle {
      position: absolute;
      left: 50%;
      top: 72%;
      width: 190px;
      height: 190px;
      transform: translate(-50%, -50%) scale(0);
      border-radius: 50%;
      opacity: 0;
      background: radial-gradient(circle, #fff, #9fd8ff, transparent 70%);
      z-index: 15;
      pointer-events: none;
    }

    .sparkle.active {
      animation: sparkle 1s ease-out forwards;
    }

    /* 열쇠 들어가는 효과 */
    .key.unlock {
      animation: unlock 1.1s ease forwards;
      filter:
        drop-shadow(0 0 20px #fff)
        drop-shadow(0 0 50px #8fd3ff);
    }

    /* 화면 전환 */
    .fade {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      z-index: 99;
      pointer-events: none;
    }

    .fade.active {
      animation: fade 0.8s forwards;
    }

    @keyframes unlock {
      0% {
        transform: translate(-50%, -50%) rotate(0deg) scale(1);
        opacity: 1;
      }
      45% {
        transform: translate(-50%, -50%) rotate(28deg) scale(0.75);
      }
      75% {
        transform: translate(-50%, -50%) rotate(75deg) scale(0.35);
      }
      100% {
        transform: translate(-50%, -50%) rotate(100deg) scale(0.05);
        opacity: 0;
      }
    }

    @keyframes sparkle {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0);
      }
      45% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.7);
      }
    }

    @keyframes fade {
      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="hero">
    <img src="./images/hero_3_writing.png" class="hero-title" alt="Heejin's Portfolio" />

    <div class="keyhole" id="keyhole"></div>
    <div class="magnet-glow" id="magnetGlow"></div>
    <div class="sparkle" id="sparkle"></div>

    <img src="./images/key.png" class="key" id="key" alt="key" />
  </div>

  <div class="fade" id="fade"></div>

  <script>
    const key = document.getElementById("key");
    const keyhole = document.getElementById("keyhole");
    const sparkle = document.getElementById("sparkle");
    const fade = document.getElementById("fade");
    const magnetGlow = document.getElementById("magnetGlow");

    let mouseX = window.innerWidth * 0.12;
    let mouseY = window.innerHeight * 0.18;

    let currentX = mouseX;
    let currentY = mouseY;

    let unlocked = false;

    const magnetRange = 85;
    const unlockRange = 28;

    window.addEventListener("mousemove", (e) => {
      if (unlocked) return;

      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function animate() {
      if (unlocked) return;

      const rect = keyhole.getBoundingClientRect();
      const holeX = rect.left + rect.width / 2;
      const holeY = rect.top + rect.height / 2;

      const distance = Math.hypot(mouseX - holeX, mouseY - holeY);

      /* 아주 가까울 때만 흡착 */
      if (distance < magnetRange) {
        magnetGlow.classList.add("active");

        const power = 1 - distance / magnetRange;

        mouseX = mouseX + (holeX - mouseX) * power * 0.08;
        mouseY = mouseY + (holeY - mouseY) * power * 0.08;

        key.style.filter = `
          drop-shadow(0 0 ${10 + power * 18}px rgba(255,255,255,0.9))
          drop-shadow(0 0 ${18 + power * 30}px rgba(130,200,255,0.75))
        `;
      } else {
        magnetGlow.classList.remove("active");
        key.style.filter = "drop-shadow(0 15px 30px rgba(0,0,0,0.35))";
      }

      /* 진짜 열쇠구멍 가까이 닿았을 때만 이동 */
      if (distance < unlockRange) {
        unlocked = true;

        key.style.left = holeX + "px";
        key.style.top = holeY + "px";

        magnetGlow.classList.remove("active");
        key.classList.add("unlock");
        sparkle.classList.add("active");

        setTimeout(() => {
          fade.classList.add("active");
        }, 700);

        setTimeout(() => {
          location.href = "main.html";
        }, 1400);

        return;
      }

      currentX += (mouseX - currentX) * 0.12;
      currentY += (mouseY - currentY) * 0.12;

      const rotate = (mouseX - currentX) * 0.04;

      key.style.left = currentX + "px";
      key.style.top = currentY + "px";
      key.style.transform = `translate(-50%, -50%) rotate(${rotate}deg)`;

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
