<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heejin's Metal Portfolio: Enter the Cosmic Chrome</title>
    <style>
        :root {
            /* 1번 이미지의 차분하면서도 몽환적인 블루-스카이 무드 */
            --bg-color-1: #b8d9ea;
            --bg-color-2: #8da9c3;
            --text-base: #2a3c50; /* 어두운 크롬 베이스 */
            --key-color: #fff;
            --sparkle-color: #fff;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, var(--bg-color-1) 0%, var(--bg-color-2) 100%);
            font-family: 'serif';
            cursor: none; /* 기본 커서 숨김 */
        }

        /* 메인 컨테이너 */
        .hero-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        /* -----------------------------------------------------------
           1. HYPER-REALISTIC CHROME TEXT (1번 이미지 기반)
           ----------------------------------------------------------- */
        .chrome-text-container {
            text-align: center;
            filter: url(#metalic-chrome); /* SVG 필터 적용 */
            position: relative;
            z-index: 2;
        }

        .chrome-text {
            display: block;
            font-size: 11rem; /* 압도적인 크기 */
            font-weight: 900;
            line-height: 0.8;
            margin: 0;
            text-transform: lowercase; /* 1번 이미지 무드 */
            color: var(--text-base); /* 필터가 색을 입힘 */
            letter-spacing: -6px;
            position: relative;
        }

        /* 액체 크롬 드립 효과 (Drip) - 1번 이미지 기반 */
        .chrome-text::before {
            content: '';
            position: absolute;
            bottom: -90px; left: 50%;
            transform: translateX(-50%);
            width: 100%; height: 150px;
            background-image: radial-gradient(circle, #fff 20%, transparent 20%);
            background-size: 50px 150px;
            filter: blur(3px) contrast(15); /* 끈적한 느낌 */
            opacity: 0.9;
        }

        /* -----------------------------------------------------------
           2. INTERACTIVE KEYHOLE (열쇠 꼽는 부분)
           ----------------------------------------------------------- */
        .entry-area {
            margin-top: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .keyhole-ring {
            width: 100px; height: 100px;
            border: 5px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            box-shadow: 
                inset 0 10px 20px rgba(0,0,0,0.5),
                0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.5s var(--ease);
            overflow: hidden;
        }

        /* 꼽는 부분의 열쇠 구멍 디자인 */
        .keyhole {
            width: 16px; height: 50px;
            background: #2a3c50; /* 어두운 구멍 */
            border-radius: 10px;
            position: relative;
        }

        /* 열쇠가 꼽혔을 때의 로딩 애니메이션 */
        .keyhole-ring.loading {
            border-color: #78a9c5;
        }
        .keyhole-ring.loading .keyhole {
            background: #78a9c5;
            animation: pulse 1s infinite var(--ease);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }

        /* -----------------------------------------------------------
           3. MOUSE-FOLLOW KEY CURSOR (2번 이미지 기반 커스텀)
           ----------------------------------------------------------- */
        #key-cursor {
            position: fixed;
            top: 0; left: 0;
            width: 120px; /* 2번 이미지 크기 */
            height: auto;
            pointer-events: none; /* 열쇠 자체는 이벤트 차단 */
            z-index: 9999;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            opacity: 0;
            transition: opacity 0.3s var(--ease);
        }

        /* -----------------------------------------------------------
           4. VISUAL EFFECTS (Sparkles & Page Transition)
           ----------------------------------------------------------- */
        /* 반짝임 (Sparkle) - 1번 이미지 기반 */
        .sparkle-effect {
            position: absolute;
            background: var(--sparkle-color);
            width: 30px; height: 30px;
            clip-path: polygon(50% 0%, 58% 42%, 100% 50%, 58% 58%, 50% 100%, 42% 58%, 0% 50%, 42% 42%);
            animation: sparklePulse 2.5s infinite;
            z-index: 5;
        }

        @keyframes sparklePulse {
            0%, 100% { opacity: 0; transform: scale(0.6) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
        }

        /* 페이지 전환용 오버레이 */
        .transition-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            z-index: 10000;
            transform: translateY(100%);
            transition: transform 1s var(--ease);
        }
        .transition-overlay.active {
            transform: translateY(0);
        }

    </style>
</head>
<body>

    <!-- 💡 CHROME METAL EFFECT 필터 (핵심) 💡 -->
    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="metalic-chrome" x="-20%" y="-20%" width="140%" height="140%">
            <!-- 1. 입체 베벨 효과 (깊은 엠보싱) -->
            <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
            <feSpecularLighting in="blur" surfaceScale="7" specularConstant="1.2" specularExponent="45" lighting-color="#fff" result="spec">
                <fePointLight x="-5000" y="-10000" z="20000" />
            </feSpecularLighting>
            <feComposite in="spec" in2="SourceAlpha" operator="in" result="specOut" />
            
            <!-- 2. 금속 색상 입히기 (어두운 크롬 베이스) -->
            <feFlood flood-color="#2a3c50" result="color" />
            <feComposite in="color" in2="SourceAlpha" operator="in" result="colorOut" />
            
            <!-- 3. 빛과 색상 합성 (크롬 광택 완성) -->
            <feBlend in="specOut" in2="colorOut" mode="screen" result="chromeLight" />

            <!-- 4. 깊이감을 위한 어두운 그림자 효과 추가 -->
            <feOffset in="SourceAlpha" dx="3" dy="5" result="shadowOffset"/>
            <feGaussianBlur in="shadowOffset" stdDeviation="3" result="shadowBlur"/>
            <feBlend in="chromeLight" in2="shadowBlur" mode="multiply" />
        </filter>
    </svg>

    <div class="hero-section">
        <!-- 반짝이 포인트 (1번 이미지 위치) -->
        <div class="sparkle-effect" style="top: 25%; left: 35%; animation-delay: 0.1s;"></div>
        <div class="sparkle-effect" style="top: 50%; left: 60%; animation-delay: 0.8s;"></div>

        <div class="chrome-text-container">
            <h1 class="chrome-text">heejin's</h1>
            <h1 class="chrome-text" style="font-size: 12rem;">portfolio</h1>
        </div>

        <!-- 열쇠 꼽는 곳 (인터랙션 영역) -->
        <div class="entry-area" id="enter-btn-area">
            <div class="keyhole-ring" id="keyhole">
                <div class="keyhole"></div>
            </div>
        </div>
    </div>

    <!-- 💡 MOUSE-FOLLOW KEY (2번 이미지 기반 커스텀) 💡 -->
    <div id="key-cursor">
        <svg viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
            <g filter="drop-shadow(0 5px 10px rgba(0,0,0,0.2))">
                <!-- 2번 이미지 모티브: 클로버/구름 머리 -->
                <path d="M50 15 A30 30 0 1 1 50 75 A30 30 0 1 1 50 15" fill="none" stroke="#fff" stroke-width="4"/>
                <circle cx="50" cy="45" r="15" fill="#78a9c5" /> <!-- 보석 포인트 -->
                
                <!-- 열쇠 기둥 -->
                <rect x="47" y="75" width="7" height="100" fill="#fff" rx="3"/>
                
                <!-- 열쇠 날 (정교한 디자인) -->
                <path d="M54 135 H70 V142 H54 M54 150 H65 V157 H54 M54 165 H72 V172 H54" fill="#fff" />
                
                <!-- 끝부분 디테일 -->
                <rect x="47" y="175" width="25" height="5" fill="#fff" />
            </g>
        </svg>
    </div>

    <!-- 페이지 전환 효과용 -->
    <div class="transition-overlay" id="trans-overlay"></div>

    <script>
        const key = document.getElementById('key-cursor');
        const entryArea = document.getElementById('enter-btn-area');
        const keyhole = document.getElementById('keyhole');
        const overlay = document.getElementById('trans-overlay');

        // 1. 마우스 팔로우 열쇠 커서
        document.addEventListener('mousemove', (e) => {
            // 초기 표시
            key.style.opacity = '1';

            // 마우스 좌표를 열쇠의 적절한 위치(꼽는 날 부분)에 맞춤
            // 오프셋을 조절하여 마우스 커서가 열쇠 날 끝에 오도록 함
            key.style.left = e.clientX - 55 + 'px';
            key.style.top = e.clientY - 140 + 'px';
        });

        // 2. 열쇠 꼽기 인터랙션
        keyhole.addEventListener('mouseenter', () => {
            // 열쇠가 구멍에 접근할 때 구멍이 반응
            keyhole.style.transform = 'scale(1.2)';
            keyhole.style.borderColor = '#fff';
            
            // 마우스 커서(열쇠)를 구멍 중앙으로 강제 이동시키는 시각적 효과
            key.style.transition = 'all 0.3s var(--ease)';
            key.style.transform = 'translate(10px, 40px) rotate(10deg)'; // 꼽는 동작
        });

        keyhole.addEventListener('mouseleave', () => {
            keyhole.style.transform = 'scale(1)';
            keyhole.style.borderColor = 'rgba(255,255,255,0.6)';
            
            key.style.transition = 'opacity 0.3s var(--ease)';
            key.style.transform = 'translate(0, 0) rotate(0deg)'; // 원래대로
        });

        keyhole.addEventListener('click', () => {
            // 클릭 시 열쇠가 꼽히고 페이지 전환
            keyhole.classList.add('loading');
            key.style.opacity = '0'; // 열쇠는 구멍 안으로

            // 0.8초 뒤 페이지 전환 애니메이션
            setTimeout(() => {
                overlay.classList.add('active');
            }, 800);

            // 1.8초 뒤 실제 페이지 이동 (url 수정 필요)
            setTimeout(() => {
                alert('포트폴리오 목차로 진입합니다!');
                // window.location.href = 'portfolio_list.html';
            }, 1800);
        });

    </script>
</body>
</html>
